<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign in · JLDS</title>
    <!--
      A JLDS template composed entirely from .jl-* classes — no framework, no build.
      Swap the local /css links below for the jsDelivr CDN to use it in your own page:
        https://cdn.jsdelivr.net/gh/jarooda/jlds@main/registry/css/index.css
        https://cdn.jsdelivr.net/gh/jarooda/jlds@main/registry/css/<name>.css
    -->
    <link rel="stylesheet" href="/css/index.css" />
    <link rel="stylesheet" href="/css/card.css" />
    <link rel="stylesheet" href="/css/field.css" />
    <link rel="stylesheet" href="/css/input.css" />
    <link rel="stylesheet" href="/css/checkbox.css" />
    <link rel="stylesheet" href="/css/button.css" />
    <link rel="stylesheet" href="/css/divider.css" />
    <link rel="stylesheet" href="/css/alert.css" />
    <style>
      body { margin: 0; }
      /* Fill the viewport when opened directly; the inline script keeps the
         fixed height the docs preview iframe needs to measure. */
      .auth { min-height: var(--auth-h, 640px); display: grid; place-items: center; padding: var(--space-6); background: var(--surface-sunken); }
      .auth-card { width: 100%; max-width: 400px; }
      .auth-card .jl-card__body { display: flex; flex-direction: column; gap: var(--space-4); }

      .brand { display: flex; align-items: center; justify-content: center; gap: var(--space-2); margin-bottom: var(--space-2); }
      .brand__mark { width: 34px; height: 34px; border-radius: var(--radius-lg); background: var(--accent); color: var(--text-on-brand); display: inline-flex; align-items: center; justify-content: center; font-weight: var(--weight-semibold); }
      .auth-head { text-align: center; margin-bottom: var(--space-1); }
      .auth-head h1 { margin: 0; font-family: var(--font-display); font-size: var(--text-xl); font-weight: var(--weight-semibold); color: var(--text-primary); }
      .auth-head p { margin: 6px 0 0; font-size: var(--text-sm); color: var(--text-secondary); }

      .label-row { display: flex; align-items: baseline; justify-content: space-between; }
      .link { color: var(--text-brand); text-decoration: none; font-size: var(--text-xs); font-weight: var(--weight-medium); }
      .link:hover { text-decoration: underline; }
      .remember-row { display: flex; align-items: center; justify-content: space-between; }

      .divider-or { display: flex; align-items: center; gap: var(--space-3); color: var(--text-tertiary); font-size: var(--text-xs); }
      .divider-or .jl-divider { flex: 1; margin: 0; }

      .sso { display: flex; align-items: center; justify-content: center; gap: var(--space-2); }
      .auth-foot { text-align: center; font-size: var(--text-sm); color: var(--text-secondary); }
    </style>
  </head>
  <body>
    <div class="auth">
      <div class="auth-card jl-card">
        <div class="jl-card__body">
          <div class="brand">
            <span class="brand__mark">A</span>
            <span style="font-family:var(--font-display);font-weight:var(--weight-semibold);color:var(--text-primary)">Acme</span>
          </div>

          <div class="auth-head">
            <h1>Welcome back</h1>
            <p>Sign in to your account to continue.</p>
          </div>

          <form onsubmit="return false">
            <div style="display:flex;flex-direction:column;gap:var(--space-4)">
              <div class="jl-field">
                <label class="jl-field__label" for="email">Email</label>
                <div class="jl-input-wrap jl-input-wrap--md">
                  <input id="email" class="jl-input" type="email" placeholder="you@company.com" autocomplete="email" />
                </div>
              </div>

              <div class="jl-field">
                <div class="label-row">
                  <label class="jl-field__label" for="password">Password</label>
                  <a class="link" href="#">Forgot password?</a>
                </div>
                <div class="jl-input-wrap jl-input-wrap--md">
                  <input id="password" class="jl-input" type="password" placeholder="••••••••" autocomplete="current-password" />
                </div>
              </div>

              <div class="remember-row">
                <label class="jl-check">
                  <input type="checkbox" class="jl-check__input" />
                  <span class="jl-check__box">
                    <svg class="jl-check__mark" viewBox="0 0 12 12" fill="none" aria-hidden="true"><path d="M2.5 6.2l2.2 2.3 4.8-5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" /></svg>
                    <span class="jl-check__dash" aria-hidden="true"></span>
                  </span>
                  <span class="jl-check__body"><span class="jl-check__label">Remember me</span></span>
                </label>
              </div>

              <button type="submit" class="jl-btn jl-btn--primary jl-btn--md jl-btn--block">Sign in</button>
            </div>
          </form>

          <div class="divider-or">
            <hr class="jl-divider jl-divider--h" role="separator" />
            <span>or</span>
            <hr class="jl-divider jl-divider--h" role="separator" />
          </div>

          <button type="button" class="jl-btn jl-btn--secondary jl-btn--md jl-btn--block sso">
            <svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M21.35 11.1H12v2.98h5.35c-.23 1.5-1.63 4.4-5.35 4.4-3.22 0-5.85-2.66-5.85-5.94S8.78 6.6 12 6.6c1.83 0 3.06.78 3.76 1.45l2.56-2.47C16.68 4.02 14.55 3.1 12 3.1 6.98 3.1 2.9 7.18 2.9 12.2s4.08 9.1 9.1 9.1c5.25 0 8.73-3.69 8.73-8.89 0-.6-.06-1.05-.13-1.51Z"/></svg>
            Continue with Google
          </button>

          <p class="auth-foot">Don't have an account? <a class="link" style="font-size:var(--text-sm)" href="#">Sign up</a></p>
        </div>
      </div>
    </div>

    <script src="/preview/resize.js"></script>
    <script>
      // Runs after resize.js. Inside the docs preview iframe, resize.js sizes the
      // frame to content and hides overflow — leave that. Opened directly
      // (top-level tab): fill the viewport and restore normal page scrolling,
      // which resize.js would otherwise have locked.
      if (window.self === window.top) {
        document.documentElement.style.setProperty("--auth-h", "100dvh");
        document.documentElement.style.overflow = "auto";
        document.body.style.overflow = "auto";
      }
    </script>
  </body>
</html>
