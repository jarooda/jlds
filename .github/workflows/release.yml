name: release

# Tag a version to cut a release:  git tag v0.1.0 && git push origin v0.1.0
# Builds the Rust CLI for every target, then publishes the npm launcher (`jlds`)
# plus the per-platform binary packages so `npx jlds` works with no Rust toolchain.
on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14 # Apple Silicon
          - target: x86_64-apple-darwin
            runner: macos-14 # cross-compiled from Apple Silicon (avoids scarce Intel runners)
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm # native arm64 Linux runner
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli

      - name: Build
        run: cargo build --manifest-path cli/Cargo.toml --release --target ${{ matrix.target }}

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist
          if [ "${{ matrix.target }}" = "x86_64-pc-windows-msvc" ]; then
            cp "cli/target/${{ matrix.target }}/release/jlds.exe" "dist/jlds-${{ matrix.target }}.exe"
          else
            cp "cli/target/${{ matrix.target }}/release/jlds" "dist/jlds-${{ matrix.target }}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: dist/jlds-${{ matrix.target }}*
          if-no-files-found: error

  publish:
    name: publish to npm
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # for npm provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: dist
          merge-multiple: true

      - name: Derive version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Assemble npm packages
        run: node npm/scripts/prepare-packages.mjs "${{ steps.ver.outputs.version }}"

      - name: Publish
        run: |
          while read -r dir; do
            [ -z "$dir" ] && continue
            echo "→ publishing $dir"
            npm publish "$dir" --access public --provenance
          done < npm/_packages/publish-list.txt
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
