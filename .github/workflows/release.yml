name: release

# Tag a version to cut a release:  git tag v0.1.0 && git push origin v0.1.0
# Builds the Rust CLI for every target, attaches the binaries to the GitHub
# Release, then publishes the single `jlds` npm package. The npm package is a
# thin launcher that downloads the matching binary from the Release on first run,
# so there are no per-platform npm packages.
on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14 # Apple Silicon
          - target: x86_64-apple-darwin
            runner: macos-14 # cross-compiled from Apple Silicon
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm # native arm64 Linux runner
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli

      - name: Build
        run: cargo build --manifest-path cli/Cargo.toml --release --target ${{ matrix.target }}

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist
          if [ "${{ matrix.target }}" = "x86_64-pc-windows-msvc" ]; then
            cp "cli/target/${{ matrix.target }}/release/jlds.exe" "dist/jlds-${{ matrix.target }}.exe"
          else
            cp "cli/target/${{ matrix.target }}/release/jlds" "dist/jlds-${{ matrix.target }}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: dist/jlds-${{ matrix.target }}*
          if-no-files-found: error

  release:
    name: github release + npm publish
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: dist
          merge-multiple: true

      - name: Derive version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Attach binaries to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/jlds-*
          fail_on_unmatched_files: true

      - name: Set npm package version
        run: npm version "${{ steps.ver.outputs.version }}" --no-git-tag-version --allow-same-version
        working-directory: npm/jlds

      - name: Publish to npm
        run: npm publish --access public --provenance
        working-directory: npm/jlds
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
