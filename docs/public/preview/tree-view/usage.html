<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="/css/index.css">
    <link rel="stylesheet" href="/css/tree-view.css">
    <style> body { margin: 0; padding: var(--space-4); max-width: 320px; } </style>
  </head>
  <body>
    <ul class="jl-tree jl-tree--guides" role="tree">
      <li class="jl-tree__li" role="none">
        <div class="jl-tree__row" role="treeitem" data-id="src" data-expanded="true" aria-expanded="true" aria-selected="false" tabindex="0">
          <span class="jl-tree__twist"><svg viewBox="0 0 24 24" fill="none"><path d="m9 6 6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
          <span class="jl-tree__icon"><svg viewBox="0 0 24 24" fill="none"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" stroke="currentColor" stroke-width="1.7"/></svg></span>
          <span class="jl-tree__label">src</span>
        </div>
        <ul class="jl-tree__group" role="group">
          <li class="jl-tree__li" role="none">
            <div class="jl-tree__row" role="treeitem" data-id="components" aria-expanded="false" aria-selected="false" tabindex="-1">
              <span class="jl-tree__twist"><svg viewBox="0 0 24 24" fill="none"><path d="m9 6 6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
              <span class="jl-tree__icon"><svg viewBox="0 0 24 24" fill="none"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" stroke="currentColor" stroke-width="1.7"/></svg></span>
              <span class="jl-tree__label">components</span>
            </div>
            <ul class="jl-tree__group" role="group" hidden>
              <li class="jl-tree__li" role="none">
                <div class="jl-tree__row" role="treeitem" data-id="button" aria-selected="false" tabindex="-1">
                  <span class="jl-tree__twist jl-tree__twist--leaf"><svg viewBox="0 0 24 24" fill="none"><path d="m9 6 6 6-6 6" stroke="currentColor" stroke-width="2"/></svg></span>
                  <span class="jl-tree__label">Button.tsx</span>
                </div>
              </li>
            </ul>
          </li>
          <li class="jl-tree__li" role="none">
            <div class="jl-tree__row" role="treeitem" data-id="index" data-selected="true" aria-selected="true" tabindex="-1">
              <span class="jl-tree__twist jl-tree__twist--leaf"><svg viewBox="0 0 24 24" fill="none"><path d="m9 6 6 6-6 6" stroke="currentColor" stroke-width="2"/></svg></span>
              <span class="jl-tree__icon"><svg viewBox="0 0 24 24" fill="none"><path d="M6 3h8l4 4v14H6z" stroke="currentColor" stroke-width="1.7"/></svg></span>
              <span class="jl-tree__label">index.ts</span>
              <span class="jl-tree__trail">2 kB</span>
            </div>
          </li>
        </ul>
      </li>
      <li class="jl-tree__li" role="none">
        <div class="jl-tree__row" role="treeitem" data-id="readme" aria-selected="false" tabindex="-1">
          <span class="jl-tree__twist jl-tree__twist--leaf"><svg viewBox="0 0 24 24" fill="none"><path d="m9 6 6 6-6 6" stroke="currentColor" stroke-width="2"/></svg></span>
          <span class="jl-tree__icon"><svg viewBox="0 0 24 24" fill="none"><path d="M6 3h8l4 4v14H6z" stroke="currentColor" stroke-width="1.7"/></svg></span>
          <span class="jl-tree__label">README.md</span>
        </div>
      </li>
    </ul>
    <script src="/js/all.js" defer></script>
    <script src="/preview/resize.js"></script>
  </body>
</html>
