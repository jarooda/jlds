<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="/css/index.css">
    <link rel="stylesheet" href="/css/timeline.css">
    <style>
      body { margin: 0; padding: var(--space-4); max-width: 460px; }
    </style>
  </head>
  <body>
    <ol class="jl-timeline jl-timeline--sm">
      <li class="jl-timeline__item">
        <div class="jl-timeline__rail">
          <span class="jl-timeline__dot" data-tone="accent" data-plain="true" aria-hidden="true"></span>
          <span class="jl-timeline__line" aria-hidden="true"></span>
        </div>
        <div class="jl-timeline__body">
          <div class="jl-timeline__head">
            <span class="jl-timeline__title">Pushed 3 commits</span>
            <span class="jl-timeline__time">09:24</span>
          </div>
        </div>
      </li>
      <li class="jl-timeline__item">
        <div class="jl-timeline__rail">
          <span class="jl-timeline__dot" data-tone="muted" data-plain="true" aria-hidden="true"></span>
          <span class="jl-timeline__line" aria-hidden="true"></span>
        </div>
        <div class="jl-timeline__body">
          <div class="jl-timeline__head">
            <span class="jl-timeline__title">Opened pull request #128</span>
            <span class="jl-timeline__time">09:31</span>
          </div>
        </div>
      </li>
      <li class="jl-timeline__item">
        <div class="jl-timeline__rail">
          <span class="jl-timeline__dot" data-tone="success" data-plain="true" aria-hidden="true"></span>
          <span class="jl-timeline__line" aria-hidden="true"></span>
        </div>
        <div class="jl-timeline__body">
          <div class="jl-timeline__head">
            <span class="jl-timeline__title">Merged to main</span>
            <span class="jl-timeline__time">10:02</span>
          </div>
        </div>
      </li>
    </ol>
    <script src="/preview/resize.js"></script>
  </body>
</html>
