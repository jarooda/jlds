<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="/css/index.css">
    <link rel="stylesheet" href="/css/banner.css">
    <style>
      body { margin: 0; }
    </style>
  </head>
  <body>
    <div class="jl-banner jl-banner--subtle jl-banner--info" role="status">
      <span class="jl-banner__icon">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.6" opacity="0.4" />
          <path d="M12 8h.01M11 12h1v4h1" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </span>
      <span class="jl-banner__content">
        <span class="jl-banner__title">Heads up</span>
        <span class="jl-banner__text">Scheduled maintenance this Sunday at 02:00 UTC.</span>
      </span>
      <button type="button" class="jl-banner__close" aria-label="Dismiss">
        <svg viewBox="0 0 16 16" width="16" height="16" fill="none" aria-hidden="true">
          <path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
        </svg>
      </button>
    </div>
    <script src="/preview/resize.js"></script>
  </body>
</html>
