<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="/css/index.css">
    <link rel="stylesheet" href="/css/stat.css">
    <style>
      body { margin: 0; padding: var(--space-4); }
    </style>
  </head>
  <body>
    <div class="jl-stat-group">
      <div class="jl-stat">
        <div class="jl-stat__top">
          <span class="jl-stat__label">Deploys</span>
          <span class="jl-stat__icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/></svg>
          </span>
        </div>
        <div class="jl-stat__value">1,843</div>
        <div class="jl-stat__foot">
          <span class="jl-stat__delta jl-stat__delta--positive">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 19V5M6 11l6-6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" /></svg>
            +8%
          </span>
          <span class="jl-stat__caption">this week</span>
        </div>
      </div>
      <div class="jl-stat">
        <div class="jl-stat__top"><span class="jl-stat__label">Avg build</span></div>
        <div class="jl-stat__value">38s</div>
        <div class="jl-stat__foot">
          <span class="jl-stat__delta jl-stat__delta--positive">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 19V5M6 11l6-6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" /></svg>
            -5%
          </span>
        </div>
      </div>
      <div class="jl-stat">
        <div class="jl-stat__top"><span class="jl-stat__label">Uptime</span></div>
        <div class="jl-stat__value">99.98%</div>
        <div class="jl-stat__foot">
          <span class="jl-stat__delta jl-stat__delta--neutral">0%</span>
        </div>
      </div>
    </div>
    <script src="/preview/resize.js"></script>
  </body>
</html>
