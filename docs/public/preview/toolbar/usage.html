<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="/css/index.css">
    <link rel="stylesheet" href="/css/toolbar.css">
    <style>
      body { margin: 0; padding: var(--space-5); font-family: var(--font-sans); }
      .wrap { max-width: 440px; margin: 0 auto; }
      .hint { font-family: var(--font-mono); font-size: var(--text-2xs); color: var(--text-tertiary); margin-top: 12px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="jl-toolbar jl-toolbar--block" role="toolbar" data-more-label="More">
        <button type="button" class="jl-toolbar__btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.85" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg><span>New</span></button>
        <button type="button" class="jl-toolbar__btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.85" stroke-linecap="round" stroke-linejoin="round"><path d="M3 5h18l-7 8v6l-4-2v-4Z"/></svg><span>Filter</span></button>
        <button type="button" class="jl-toolbar__btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.85" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M7 12h10M10 18h4"/></svg><span>Sort</span></button>
        <span class="jl-toolbar__sep" aria-hidden="true"></span>
        <button type="button" class="jl-toolbar__btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.85" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3 2.9 5.9 6.5.9-4.7 4.6 1.1 6.5L12 18.6 6.2 21.4l1.1-6.5L2.6 9.8l6.5-.9Z"/></svg><span>Star</span></button>
        <button type="button" class="jl-toolbar__btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.85" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5h10"/></svg><span>Duplicate</span></button>
        <button type="button" class="jl-toolbar__btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.85" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M9 7V5h6v2M6 7l1 13h10l1-13"/></svg><span>Delete</span></button>
      </div>
      <p class="hint">Narrow the pane — the lowest-priority items fold into “More”.</p>
    </div>
    <script src="/js/all.js" defer></script>
    <script src="/preview/resize.js"></script>
  </body>
</html>
