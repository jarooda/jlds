<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="/css/index.css">
    <link rel="stylesheet" href="/css/toast.css">
    <link rel="stylesheet" href="/css/button.css">
    <style>
      body { margin: 0; padding: var(--space-4); min-height: 200px; display: flex; flex-wrap: wrap; align-items: flex-start; gap: var(--space-2); }
      .jl-toaster { position: absolute; }
    </style>
  </head>
  <body>
    <button class="jl-btn jl-btn--secondary jl-btn--sm" onclick="JLDS.toast.success('Saved')">Success</button>
    <button class="jl-btn jl-btn--secondary jl-btn--sm" onclick="JLDS.toast.warning('Almost out of space')">Warning</button>
    <button class="jl-btn jl-btn--secondary jl-btn--sm" onclick="JLDS.toast.danger('Could not save')">Danger</button>
    <button class="jl-btn jl-btn--secondary jl-btn--sm" onclick="JLDS.toast.info('A new version is available')">Info</button>
    <button class="jl-btn jl-btn--primary jl-btn--sm" onclick="JLDS.toast({ title: 'Deploy failed', description: 'Build #1843 errored on the test step.', tone: 'danger', action: { label: 'Retry', onClick: function(){} }, duration: Infinity })">With action</button>
    <script src="/js/all.js" defer></script>
    <script src="/preview/resize.js"></script>
  </body>
</html>
