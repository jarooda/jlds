<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="/css/index.css">
    <link rel="stylesheet" href="/css/switch.css">
    <style>
      body { margin: 0; padding: var(--space-4); display: flex; flex-direction: column; gap: var(--space-3); }
    </style>
  </head>
  <body>
    <label class="jl-switch jl-switch--md" data-disabled="true">
      <input type="checkbox" role="switch" class="jl-switch__input" checked disabled />
      <span class="jl-switch__track"><span class="jl-switch__thumb"></span></span>
      <span class="jl-switch__label">Locked on</span>
    </label>
    <label class="jl-switch jl-switch--md" data-disabled="true">
      <input type="checkbox" role="switch" class="jl-switch__input" disabled />
      <span class="jl-switch__track"><span class="jl-switch__thumb"></span></span>
      <span class="jl-switch__label">Locked off</span>
    </label>
    <script src="/preview/resize.js"></script>
  </body>
</html>
