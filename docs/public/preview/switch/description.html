<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="/css/index.css">
    <link rel="stylesheet" href="/css/switch.css">
    <style>
      body { margin: 0; padding: var(--space-4); display: flex; flex-direction: column; gap: var(--space-4); max-width: 360px; }
    </style>
  </head>
  <body>
    <label class="jl-switch jl-switch--md">
      <input type="checkbox" role="switch" class="jl-switch__input" checked />
      <span class="jl-switch__track"><span class="jl-switch__thumb"></span></span>
      <span class="jl-switch__body">
        <span class="jl-switch__label">Auto-deploy</span>
        <span class="jl-switch__desc">Ship on every push to main.</span>
      </span>
    </label>
    <label class="jl-switch jl-switch--md jl-switch--start">
      <input type="checkbox" role="switch" class="jl-switch__input" />
      <span class="jl-switch__track"><span class="jl-switch__thumb"></span></span>
      <span class="jl-switch__body">
        <span class="jl-switch__label">Require reviews</span>
        <span class="jl-switch__desc">Label sits at the start.</span>
      </span>
    </label>
    <script src="/preview/resize.js"></script>
  </body>
</html>
