<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="/css/index.css">
    <link rel="stylesheet" href="/css/radio-group.css">
    <style>
      body { margin: 0; padding: var(--space-4); }
    </style>
  </head>
  <body>
    <div class="jl-radiogroup jl-radiogroup--row" role="radiogroup">
      <label class="jl-radio">
        <input type="radio" class="jl-radio__input" name="size" value="sm" checked />
        <span class="jl-radio__dot"></span>
        <span class="jl-radio__body"><span class="jl-radio__label">Small</span></span>
      </label>
      <label class="jl-radio">
        <input type="radio" class="jl-radio__input" name="size" value="md" />
        <span class="jl-radio__dot"></span>
        <span class="jl-radio__body"><span class="jl-radio__label">Medium</span></span>
      </label>
      <label class="jl-radio">
        <input type="radio" class="jl-radio__input" name="size" value="lg" />
        <span class="jl-radio__dot"></span>
        <span class="jl-radio__body"><span class="jl-radio__label">Large</span></span>
      </label>
    </div>
    <script src="/preview/resize.js"></script>
  </body>
</html>
