<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="/css/index.css">
    <link rel="stylesheet" href="/css/slider.css">
    <style>
      body { margin: 0; padding: var(--space-5) var(--space-4); max-width: 360px; }
    </style>
  </head>
  <body>
    <div class="jl-slider jl-slider--md" data-min="0" data-max="100" data-step="1">
      <div class="jl-slider__track">
        <span class="jl-slider__fill"></span>
        <button type="button" class="jl-slider__thumb" data-value="40" role="slider" aria-valuemin="0" aria-valuemax="100" aria-valuenow="40" tabindex="0"></button>
      </div>
    </div>
    <script src="/preview/slider-demo.js"></script>
    <script src="/preview/resize.js"></script>
  </body>
</html>
