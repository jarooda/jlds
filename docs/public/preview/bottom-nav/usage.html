<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="/css/index.css">
    <link rel="stylesheet" href="/css/bottom-nav.css">
    <style>
      body { margin: 0; padding: var(--space-4); background: var(--bg-subtle); }
      .frame { max-width: 360px; margin: 0 auto; background: var(--surface-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-2xl); overflow: hidden; }
      .frame__body { height: 200px; display: grid; place-items: center; color: var(--text-tertiary); font-family: var(--font-sans); font-size: var(--text-sm); }
    </style>
  </head>
  <body>
    <div class="frame">
      <div class="frame__body">Tap a tab</div>
      <nav class="jl-bottomnav" aria-label="Primary">
        <button type="button" class="jl-bottomnav__item" data-id="home" aria-current="page">
          <span class="jl-bottomnav__icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg></span>
          <span class="jl-bottomnav__label">Home</span>
        </button>
        <button type="button" class="jl-bottomnav__item" data-id="search">
          <span class="jl-bottomnav__icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg></span>
          <span class="jl-bottomnav__label">Search</span>
        </button>
        <button type="button" class="jl-bottomnav__item" data-id="inbox">
          <span class="jl-bottomnav__icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h5l2 3h4l2-3h5"/><path d="M4 12V6h16v6"/></svg><span class="jl-bottomnav__badge">3</span></span>
          <span class="jl-bottomnav__label">Inbox</span>
        </button>
        <button type="button" class="jl-bottomnav__item" data-id="me">
          <span class="jl-bottomnav__icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-3.3 3.6-6 8-6s8 2.7 8 6"/></svg></span>
          <span class="jl-bottomnav__label">Account</span>
        </button>
      </nav>
    </div>
    <script src="/js/all.js" defer></script>
    <script src="/preview/resize.js"></script>
  </body>
</html>
