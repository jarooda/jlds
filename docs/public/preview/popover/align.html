<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="/css/index.css">
    <link rel="stylesheet" href="/css/popover.css">
    <link rel="stylesheet" href="/css/button.css">
    <style>
      body { margin: 0; padding: var(--space-4); display: flex; gap: var(--space-4); justify-content: space-between; min-height: 180px; align-items: flex-start; }
    </style>
  </head>
  <body>
    <span class="jl-popover">
      <button class="jl-btn jl-btn--secondary jl-btn--md">Start</button>
      <div class="jl-popover__pop" role="dialog" data-side="bottom" data-align="start" hidden>
        <span class="jl-popover__arrow" aria-hidden="true"></span>
        <p style="margin:0;color:var(--text-secondary);font-size:var(--text-sm)">Aligned to the start edge.</p>
      </div>
    </span>
    <span class="jl-popover">
      <button class="jl-btn jl-btn--secondary jl-btn--md">End</button>
      <div class="jl-popover__pop" role="dialog" data-side="bottom" data-align="end" hidden>
        <span class="jl-popover__arrow" aria-hidden="true"></span>
        <p style="margin:0;color:var(--text-secondary);font-size:var(--text-sm)">Aligned to the end edge.</p>
      </div>
    </span>
    <script src="/js/all.js" defer></script>
    <script src="/preview/resize.js"></script>
  </body>
</html>
