<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="/css/index.css">
    <link rel="stylesheet" href="/css/date-picker.css">
    <style>
      body { margin: 0; padding: var(--space-4); min-height: 380px; }
    </style>
  </head>
  <body>
    <span class="jl-datepicker">
      <button type="button" class="jl-datepicker__trigger" aria-haspopup="dialog" aria-expanded="false">
        <span class="jl-datepicker__icon"><svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><rect x="3" y="5" width="18" height="16" rx="2.2" stroke="currentColor" stroke-width="1.75"/><path d="M3 9.5h18M8 3v4M16 3v4" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/></svg></span>
        <span class="jl-datepicker__value" data-placeholder="true">Pick a date</span>
      </button>
    </span>
    <script src="/js/all.js" defer></script>
    <script src="/preview/resize.js"></script>
  </body>
</html>
