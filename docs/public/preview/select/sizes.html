<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="/css/index.css">
    <link rel="stylesheet" href="/css/select.css">
    <style>
      body { margin: 0; padding: var(--space-4); max-width: 280px; display: flex; flex-direction: column; gap: var(--space-3); }
    </style>
  </head>
  <body>
    <span class="jl-select-wrap">
      <select class="jl-select jl-select--sm"><option>Small</option></select>
      <span class="jl-select-chevron">
        <svg viewBox="0 0 16 16" width="16" height="16" fill="none" aria-hidden="true"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" /></svg>
      </span>
    </span>
    <span class="jl-select-wrap">
      <select class="jl-select jl-select--md"><option>Medium</option></select>
      <span class="jl-select-chevron">
        <svg viewBox="0 0 16 16" width="16" height="16" fill="none" aria-hidden="true"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" /></svg>
      </span>
    </span>
    <span class="jl-select-wrap">
      <select class="jl-select jl-select--lg"><option>Large</option></select>
      <span class="jl-select-chevron">
        <svg viewBox="0 0 16 16" width="16" height="16" fill="none" aria-hidden="true"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" /></svg>
      </span>
    </span>
    <script src="/preview/resize.js"></script>
  </body>
</html>
