<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="/css/index.css">
    <link rel="stylesheet" href="/css/page-header.css">
    <link rel="stylesheet" href="/css/button.css">
    <link rel="stylesheet" href="/css/tabs.css">
    <style> body { margin: 0; background: var(--surface-muted); } </style>
  </head>
  <body>
    <header class="jl-pageheader jl-pageheader--surface">
      <div class="jl-pageheader__bar">
        <div class="jl-pageheader__lead">
          <button type="button" class="jl-pageheader__back" aria-label="Go back"><svg viewBox="0 0 24 24" fill="none"><path d="m15 6-6 6 6 6" stroke="currentColor" stroke-width="1.85" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        </div>
        <div class="jl-pageheader__heading">
          <div class="jl-pageheader__titlerow">
            <h1 class="jl-pageheader__title">Billing</h1>
          </div>
          <p class="jl-pageheader__desc">Plan, invoices, and payment methods.</p>
        </div>
        <div class="jl-pageheader__actions">
          <button class="jl-btn jl-btn--primary jl-btn--md">Upgrade</button>
        </div>
      </div>
      <div class="jl-pageheader__tabs">
        <div class="jl-tabs jl-tabs--line" role="tablist">
          <button type="button" class="jl-tab" role="tab" aria-selected="true">Overview</button>
          <button type="button" class="jl-tab" role="tab" aria-selected="false">Invoices</button>
          <button type="button" class="jl-tab" role="tab" aria-selected="false">Payment</button>
        </div>
      </div>
    </header>
    <script src="/preview/resize.js"></script>
  </body>
</html>
