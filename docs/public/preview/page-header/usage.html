<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="/css/index.css">
    <link rel="stylesheet" href="/css/page-header.css">
    <link rel="stylesheet" href="/css/button.css">
    <link rel="stylesheet" href="/css/breadcrumb.css">
    <style> body { margin: 0; background: var(--surface-muted); } </style>
  </head>
  <body>
    <header class="jl-pageheader jl-pageheader--surface">
      <nav class="jl-breadcrumb jl-pageheader__crumb" aria-label="Breadcrumb">
        <ol class="jl-breadcrumb__list">
          <li class="jl-breadcrumb__item"><a class="jl-breadcrumb__link" href="#">Projects</a></li>
