<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="/css/index.css">
    <link rel="stylesheet" href="/css/sidebar.css">
    <style> body { margin: 0; height: 420px; display: flex; background: var(--surface-muted); } </style>
  </head>
  <body>
    <aside class="jl-sidebar">
      <div class="jl-sidebar__header">
        <div style="display:flex;align-items:center;gap:var(--space-2);font-weight:var(--weight-semibold);color:var(--text-primary);padding:0 var(--space-2)">
          <span style="width:26px;height:26px;border-radius:var(--radius-md);background:var(--accent);display:inline-flex;align-items:center;justify-content:center;color:var(--text-on-brand);font-size:var(--text-sm)">A</span>
          Acme
        </div>
      </div>
      <nav class="jl-sidebar__body">
        <div class="jl-sidebar__group">
          <button type="button" class="jl-sidebar__item" data-active="true">
            <span class="jl-sidebar__item-icon"><svg viewBox="0 0 24 24" fill="none"><path d="M3 12 12 3l9 9M5 10v10h14V10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
            <span class="jl-sidebar__item-label">Home</span>
          </button>
          <button type="button" class="jl-sidebar__item">
            <span class="jl-sidebar__item-icon"><svg viewBox="0 0 24 24" fill="none"><path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></span>
            <span class="jl-sidebar__item-label">Projects</span>
            <span class="jl-sidebar__item-badge">12</span>
          </button>
          <button type="button" class="jl-sidebar__item">
            <span class="jl-sidebar__item-icon"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.8"/><path d="M4 20c0-3.3 3.6-6 8-6s8 2.7 8 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></span>
            <span class="jl-sidebar__item-label">Team</span>
          </button>
        </div>
        <div class="jl-sidebar__group">
          <div class="jl-sidebar__group-label">Account</div>
          <button type="button" class="jl-sidebar__item">
            <span class="jl-sidebar__item-icon"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/><path d="M12 3v3M12 18v3M3 12h3M18 12h3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></span>
            <span class="jl-sidebar__item-label">Settings</span>
          </button>
        </div>
      </nav>
      <div class="jl-sidebar__footer">
        <button type="button" class="jl-sidebar__item">
          <span class="jl-sidebar__item-icon"><svg viewBox="0 0 24 24" fill="none"><path d="M15 4h4v16h-4M10 8l-4 4 4 4M6 12h9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
          <span class="jl-sidebar__item-label">Log out</span>
        </button>
      </div>
    </aside>
    <script src="/preview/resize.js"></script>
  </body>
</html>
