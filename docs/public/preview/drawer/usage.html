<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="/css/index.css">
    <link rel="stylesheet" href="/css/drawer.css">
    <link rel="stylesheet" href="/css/button.css">
    <link rel="stylesheet" href="/css/field.css">
    <link rel="stylesheet" href="/css/input.css">
    <style>
      body { margin: 0; padding: var(--space-5) var(--space-4); min-height: 360px; }
      .jl-drawer__overlay { position: absolute; }
    </style>
  </head>
  <body>
    <button class="jl-btn jl-btn--secondary jl-btn--md" data-drawer-trigger data-drawer-target="#filters">Open filters →</button>

    <div class="jl-drawer__overlay" id="filters" data-side="right" hidden>
      <div class="jl-drawer" role="dialog" aria-modal="true" style="--_size: 340px">
        <div class="jl-drawer__header">
          <div class="jl-drawer__header-text">
            <div class="jl-drawer__title">Filters</div>
            <div class="jl-drawer__desc">Narrow down the results.</div>
          </div>
          <button type="button" class="jl-drawer__close" aria-label="Close">
            <svg viewBox="0 0 18 18" width="18" height="18" fill="none" aria-hidden="true"><path d="M5 5l8 8M13 5l-8 8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
          </button>
        </div>
        <div class="jl-drawer__body">
          <div class="jl-field">
            <label class="jl-field__label">Keyword</label>
            <div class="jl-input-wrap jl-input-wrap--md"><input class="jl-input" placeholder="Search…" /></div>
          </div>
        </div>
        <div class="jl-drawer__footer">
          <button class="jl-btn jl-btn--secondary jl-btn--md" data-drawer-close>Reset</button>
          <button class="jl-btn jl-btn--primary jl-btn--md" data-drawer-close>Apply</button>
        </div>
      </div>
    </div>
    <script src="/js/all.js" defer></script>
    <script src="/preview/resize.js"></script>
  </body>
</html>
