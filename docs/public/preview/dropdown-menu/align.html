<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="/css/index.css">
    <link rel="stylesheet" href="/css/dropdown-menu.css">
    <link rel="stylesheet" href="/css/button.css">
    <style>
      body { margin: 0; padding: var(--space-4); display: flex; justify-content: space-between; min-height: 230px; align-items: flex-start; }
    </style>
  </head>
  <body>
    <span class="jl-menu">
      <button class="jl-btn jl-btn--secondary jl-btn--md">Align start</button>
      <div class="jl-menu__pop" role="menu" data-side="bottom" data-align="start" hidden>
        <button type="button" role="menuitem" class="jl-menu__item"><span class="jl-menu__item-label">Profile</span></button>
        <button type="button" role="menuitem" class="jl-menu__item"><span class="jl-menu__item-label">Settings</span></button>
        <button type="button" role="menuitem" class="jl-menu__item"><span class="jl-menu__item-label">Sign out</span></button>
      </div>
    </span>
    <span class="jl-menu">
      <button class="jl-btn jl-btn--secondary jl-btn--md">Align end</button>
      <div class="jl-menu__pop" role="menu" data-side="bottom" data-align="end" hidden>
        <button type="button" role="menuitem" class="jl-menu__item"><span class="jl-menu__item-label">Profile</span></button>
        <button type="button" role="menuitem" class="jl-menu__item"><span class="jl-menu__item-label">Settings</span></button>
        <button type="button" role="menuitem" class="jl-menu__item"><span class="jl-menu__item-label">Sign out</span></button>
      </div>
    </span>
    <script src="/js/all.js" defer></script>
    <script src="/preview/resize.js"></script>
  </body>
</html>
