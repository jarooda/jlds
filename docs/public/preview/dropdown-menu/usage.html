<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="/css/index.css">
    <link rel="stylesheet" href="/css/dropdown-menu.css">
    <link rel="stylesheet" href="/css/button.css">
    <style>
      body { margin: 0; padding: var(--space-4); display: flex; justify-content: center; min-height: 300px; align-items: flex-start; }
    </style>
  </head>
  <body>
    <span class="jl-menu">
      <button class="jl-btn jl-btn--secondary jl-btn--md">Actions</button>
      <div class="jl-menu__pop" role="menu" data-side="bottom" data-align="start" hidden>
        <div class="jl-menu__label">Manage</div>
        <button type="button" role="menuitem" class="jl-menu__item">
          <span class="jl-menu__item-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg></span>
          <span class="jl-menu__item-label">Edit</span>
          <span class="jl-menu__item-shortcut">⌘E</span>
        </button>
        <button type="button" role="menuitem" class="jl-menu__item">
          <span class="jl-menu__item-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg></span>
          <span class="jl-menu__item-label">Duplicate</span>
        </button>
        <div class="jl-menu__sep" role="separator"></div>
        <button type="button" role="menuitem" class="jl-menu__item jl-menu__item--danger">
          <span class="jl-menu__item-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg></span>
          <span class="jl-menu__item-label">Delete</span>
        </button>
      </div>
    </span>
    <script src="/js/all.js" defer></script>
    <script src="/preview/resize.js"></script>
  </body>
</html>
