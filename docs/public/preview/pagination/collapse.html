<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="/css/index.css">
    <link rel="stylesheet" href="/css/pagination.css">
    <style>
      body { margin: 0; padding: var(--space-4); }
    </style>
  </head>
  <body>
    <nav class="jl-pagination" aria-label="Pagination">
      <div class="jl-pagination__list">
        <button class="jl-page jl-page--arrow" aria-label="Previous page">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="m15 6-6 6 6 6" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" /></svg>
        </button>
        <button class="jl-page" aria-label="Page 1">1</button>
        <span class="jl-page jl-page--ellipsis" aria-hidden="true">…</span>
        <button class="jl-page" aria-label="Page 5">5</button>
        <button class="jl-page" aria-current="page" aria-label="Page 6">6</button>
        <button class="jl-page" aria-label="Page 7">7</button>
        <span class="jl-page jl-page--ellipsis" aria-hidden="true">…</span>
        <button class="jl-page" aria-label="Page 20">20</button>
        <button class="jl-page jl-page--arrow" aria-label="Next page">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="m9 6 6 6-6 6" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" /></svg>
        </button>
      </div>
    </nav>
    <script src="/preview/resize.js"></script>
  </body>
</html>
