<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="/css/index.css">
    <link rel="stylesheet" href="/css/scroll-area.css">
    <style>
      body { margin: 0; padding: var(--space-4); max-width: 360px; }
      .card { border: 1px solid var(--border-subtle); border-radius: var(--radius-xl); background: var(--surface-card); }
      .row { padding: var(--space-3) var(--space-4); border-bottom: 1px solid var(--border-subtle); font-size: var(--text-sm); color: var(--text-secondary); }
      .row:last-child { border-bottom: none; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="jl-scrollarea jl-scrollarea--y">
        <div class="jl-scrollarea__viewport" style="max-height: 220px">
          <div class="row">Aldous Huxley</div>
          <div class="row">Ada Lovelace</div>
          <div class="row">Alan Turing</div>
          <div class="row">Barbara Liskov</div>
          <div class="row">Claude Shannon</div>
          <div class="row">Donald Knuth</div>
          <div class="row">Edsger Dijkstra</div>
          <div class="row">Grace Hopper</div>
          <div class="row">John von Neumann</div>
          <div class="row">Ken Thompson</div>
          <div class="row">Margaret Hamilton</div>
          <div class="row">Tim Berners-Lee</div>
        </div>
      </div>
    </div>
    <script src="/preview/resize.js"></script>
  </body>
</html>
