<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="/css/index.css">
    <link rel="stylesheet" href="/css/dialog.css">
    <link rel="stylesheet" href="/css/button.css">
    <style>
      body { margin: 0; padding: var(--space-5) var(--space-4); min-height: 320px; }
    </style>
  </head>
  <body>
    <button class="jl-btn jl-btn--danger jl-btn--md" data-dialog-trigger data-dialog-target="#confirm">Delete project…</button>

    <div class="jl-dialog__overlay" id="confirm" hidden>
      <div class="jl-dialog jl-dialog--sm" role="dialog" aria-modal="true">
        <div class="jl-dialog__header">
          <div class="jl-dialog__header-text">
            <div class="jl-dialog__title">Delete project?</div>
            <div class="jl-dialog__desc">This permanently removes the project and all of its data. This action can't be undone.</div>
          </div>
          <button type="button" class="jl-dialog__close" aria-label="Close">
            <svg viewBox="0 0 18 18" width="18" height="18" fill="none" aria-hidden="true"><path d="M5 5l8 8M13 5l-8 8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
          </button>
        </div>
        <div class="jl-dialog__footer">
          <button class="jl-btn jl-btn--secondary jl-btn--md" data-dialog-close>Cancel</button>
          <button class="jl-btn jl-btn--danger jl-btn--md" data-dialog-close>Delete</button>
        </div>
      </div>
    </div>
    <script src="/js/all.js" defer></script>
    <script src="/preview/resize.js"></script>
  </body>
</html>
