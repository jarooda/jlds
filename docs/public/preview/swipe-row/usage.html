<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="/css/index.css">
    <link rel="stylesheet" href="/css/swipe-row.css">
    <style>
      body { margin: 0; padding: var(--space-4); background: var(--surface-sunken); font-family: var(--font-sans); }
      .list { max-width: 460px; margin: 0 auto; display: flex; flex-direction: column; gap: 6px; }
      .row { display: flex; align-items: center; gap: 12px; padding: 13px 16px; }
      .row .av { width: 34px; height: 34px; border-radius: 10px; background: var(--accent-subtle); color: var(--text-brand); display: grid; place-items: center; font-weight: 600; font-size: 13px; }
      .row .nm { font-size: var(--text-sm); font-weight: 600; color: var(--text-primary); }
      .row .mt { font-size: var(--text-xs); color: var(--text-tertiary); }
      .row .tm { margin-left: auto; font-family: var(--font-mono); font-size: var(--text-xs); color: var(--text-tertiary); }
      .hint { max-width: 460px; margin: 12px auto 0; font-family: var(--font-mono); font-size: var(--text-2xs); color: var(--text-tertiary); }
    </style>
  </head>
  <body>
    <div class="list">
      <div class="jl-swiperow">
        <div class="jl-swiperow__actions">
          <button type="button" class="jl-swiperow__action" data-tone="accent"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3 2.9 5.9 6.5.9-4.7 4.6 1.1 6.5L12 18.6 6.2 21.4l1.1-6.5L2.6 9.8l6.5-.9Z"/></svg><span>Pin</span></button>
          <button type="button" class="jl-swiperow__action" data-tone="danger"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M9 7V5h6v2M6 7l1 13h10l1-13"/></svg><span>Delete</span></button>
        </div>
        <div class="jl-swiperow__panel">
          <div class="row"><div class="av">A</div><div><div class="nm">acme-web</div><div class="mt">Production · build #1843</div></div><div class="tm">4m</div></div>
        </div>
      </div>
      <div class="jl-swiperow">
        <div class="jl-swiperow__actions">
          <button type="button" class="jl-swiperow__action" data-tone="accent"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3 2.9 5.9 6.5.9-4.7 4.6 1.1 6.5L12 18.6 6.2 21.4l1.1-6.5L2.6 9.8l6.5-.9Z"/></svg><span>Pin</span></button>
          <button type="button" class="jl-swiperow__action" data-tone="danger"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M9 7V5h6v2M6 7l1 13h10l1-13"/></svg><span>Delete</span></button>
        </div>
        <div class="jl-swiperow__panel">
          <div class="row"><div class="av">D</div><div><div class="nm">docs-site</div><div class="mt">Preview · build #221</div></div><div class="tm">1h</div></div>
        </div>
      </div>
    </div>
    <p class="hint">Swipe a row left on touch, or hover on desktop, to reveal the actions.</p>
    <script src="/js/all.js" defer></script>
    <script src="/preview/resize.js"></script>
  </body>
</html>
